description: "XybOrg Live voice agent with secrets, plugins, sessions, and mode switching"
example_question: "What can you help me with?"
settings:
  requires_data_ingestion: false
  requires_session: true
  frontend_type: "xyborg_live_react"
  deployment_targets: ["agent_engine"]
  extra_dependencies:
    - "google-adk>=1.16.0,<2.0.0"
    - "click>=8.0.0,<9.0.0"
    - "uvicorn>=0.18.0,<1.0.0"
    - "fastapi>=0.75.0,<1.0.0"
    - "backoff>=2.0.0,<3.0.0"
    - "asyncpg>=0.30.0,<1.0.0"
  tags: ["adk", "adk_live"]
  commands:
    override:
      deploy: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && cd $$PROJECT_ROOT && uv run python -m scripts.deployment.cli deploy $$PROJECT_NAME $$AGENT_DIR --yes"
      playground: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && ([ -d frontend/build ] || (cd frontend && npm run build)) && PYTHONPATH=$$PROJECT_ROOT:$$PYTHONPATH uv run python -m $$AGENT_DIR.app_utils.expose_app --mode local --local-agent $$AGENT_DIR.agent.root_agent"
      test: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && PYTHONPATH=$$PROJECT_ROOT:$$PYTHONPATH uv run pytest tests/unit && PYTHONPATH=$$PROJECT_ROOT:$$PYTHONPATH uv run pytest tests/integration"
    extra:
      run:
        description: "Run agent locally via adk"
        command: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PYTHONPATH=$$PROJECT_ROOT:$$PYTHONPATH uv run adk run $$AGENT_DIR"
      live:
        description: "Start Live API backend (WebSocket server)"
        command: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PYTHONPATH=$$PROJECT_ROOT:$$PYTHONPATH uv run uvicorn $$AGENT_DIR.fast_api_app:app --host 0.0.0.0 --port 8000 --reload"
      frontend-dev:
        description: "Start frontend dev server (hot reload)"
        command: "@cd frontend && npm run dev"
      analyze:
        description: "Analyze dependencies (internal common/config + external PyPI packages)"
        command: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && cd $$PROJECT_ROOT && uv run python -m scripts.deployment.cli analyze $$PROJECT_NAME $$AGENT_DIR"
      prepare:
        description: "Prepare deployment (analyze deps, update toml, create staging)"
        command: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && cd $$PROJECT_ROOT && uv run python -m scripts.deployment.cli prepare $$PROJECT_NAME $$AGENT_DIR"
      deploy-verbose:
        description: "Full deployment with detailed logging"
        command: "@PROJECT_ROOT=$$(git rev-parse --show-toplevel 2>/dev/null || echo \"../..\") && AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && cd $$PROJECT_ROOT && uv run python -m scripts.deployment.cli deploy $$PROJECT_NAME $$AGENT_DIR --yes --verbose"
      logs:
        description: "Fetch recent logs from deployed agent"
        command: "@PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && PROJECT_ID=$$(gcloud config get-value project) && gcloud logging read \"resource.labels.service_name=\\\"$$PROJECT_NAME\\\"\" --project=$$PROJECT_ID --limit=50 --format='table(timestamp,jsonPayload.message)' --freshness=1h"
      logs-stream:
        description: "Stream live logs from deployed agent"
        command: "@PROJECT_NAME=$$(awk -F'\"' '/^name =/{print $$2; exit}' pyproject.toml) && PROJECT_ID=$$(gcloud config get-value project) && gcloud alpha logging tail \"resource.labels.service_name=\\\"$$PROJECT_NAME\\\"\" --project=$$PROJECT_ID --format='table(timestamp,jsonPayload.message)'"
      status:
        description: "Show deployment status"
        command: "@cat deployment_metadata.json 2>/dev/null && echo '' || echo 'No deployment metadata. Run make deploy first.'"
      clean:
        description: "Clean staging and cache artifacts"
        command: "@AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && rm -rf __pycache__ .pytest_cache .mypy_cache .ty .coverage htmlcov $$AGENT_DIR/app_utils/.requirements.txt && echo 'Cleaned.'"
      export-requirements:
        description: "Export requirements without deploying"
        command: "@AGENT_DIR=$$(awk -F'\"' '/^agent_directory =/{print $$2}' pyproject.toml) && (uv export --no-hashes --no-header --no-dev --no-emit-project --no-annotate > $$AGENT_DIR/app_utils/.requirements.txt 2>/dev/null || uv export --no-hashes --no-header --no-dev --no-emit-project > $$AGENT_DIR/app_utils/.requirements.txt) && echo 'Requirements exported.'"
